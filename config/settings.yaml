project_name: NAS-Streamliner

paths:
  project_root: ..
  inbound_root: ${NAS_STREAMLINER_INBOUND_ROOT:-../runtime/inbound}
  storage_root: ${NAS_STREAMLINER_STORAGE_ROOT:-../runtime/storage}
  quarantine_root: ${NAS_STREAMLINER_QUARANTINE_ROOT:-../runtime/quarantine}
  log_root: ${NAS_STREAMLINER_LOG_ROOT:-../runtime/logs}
  state_db: ${NAS_STREAMLINER_STATE_DB:-../runtime/state/nas_streamliner.db}
  manifest_path: ${NAS_STREAMLINER_MANIFEST_PATH:-../runtime/state/manifest.jsonl}
  camera_map_path: ${NAS_STREAMLINER_CAMERA_MAP_PATH:-./cam_map.yaml}

watcher:
  scan_interval_seconds: 5
  stable_window_seconds: 20
  minimum_file_age_seconds: 10
  accepted_extensions:
    - .mp4
    - .mov
    - .mxf
    - .m4v
    - .avi
  ignore_hidden_files: true

ffprobe:
  binary: ffprobe
  timeout_seconds: 20
  metadata_date_keys:
    - creation_time
    - com.apple.quicktime.creationdate
    - date
  metadata_model_keys:
    - model
    - com.apple.quicktime.model
    - device_model
  metadata_serial_keys:
    - serial_number
    - com.apple.quicktime.serialno
    - reel_name

classification:
  timezone: Asia/Seoul
  unknown_camera_alias: Z-CAM-UNKNOWN
  unknown_date_folder: 1970-01-01
  fallback_to_file_modified_time: true
  quarantine_on_missing_date: false
  quarantine_on_missing_camera: false
  rename_original_files: true

naming:
  original_basename_template: "{capture_date_compact}_{capture_time_compact}_{camera_alias}_{source_stem}"
  duplicate_suffix_template: "__v{index:02d}"
  maximum_stem_length: 48

logging:
  level: INFO
  file_name: nas_streamliner.log

encoder:
  enabled: true
  ffmpeg_binary: ffmpeg
  timeout_seconds: 0
  auto_encode_after_classification: true
  proxy_subdir_name: Proxy
  proxy_suffix: "__proxy_720p_cfr"
  output_extension: .mp4
  skip_if_source_not_newer: true
  video_codec: libx264
  video_preset: veryfast
  video_crf: 23
  pixel_format: yuv420p
  max_width: 1280
  max_height: 720
  audio_codec: aac
  audio_bitrate: 160k
  movflags_faststart: true

preflight:
  enabled: true
  create_missing_directories: true
  verify_camera_map_exists: true
  verify_inbound_exists: true
  verify_storage_writable: true
  verify_quarantine_writable: true
  verify_log_root_writable: true
  verify_state_root_writable: true
  write_probe_file_name: .nas-streamliner-write-test
